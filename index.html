<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/atv.css" />
    <link rel="shortcut icon" href="./images/ico.png" type="image/x-icon" />
    <script src="./js/script.js" defer></script>
    <title>Receitas</title>
  </head>
  <body>
    <header>
      <h1>Receitas da Vovó API</h1>
      <div class="busca">
        <input
          type="text"
          placeholder="Buscar receita..."
          id="idReceita"
          onkeydown="if (event.key === 'Enter') buscarReceita();"
        />
        <button onclick="buscarReceita()">Buscar</button>
      </div>
    </header>

    <section class="titulo">
      <h2>Receitas</h2>
    </section>

    <main>
      <img src="./images/vovo.jpg" alt="Imagem da Receita" id="imageReceita" />
      <div id="container">
        <div class="info">
          <p>Nome: <span id="nomeReceita"></span></p>
        </div>
        <div class="info">
          <p>Criado na: <span id="localReceita"></span></p>
        </div>
        <div class="info">
          <p>Dificuldade: <span id="dificuldadeReceita"></span></p>
        </div>
        <div class="info">
          <p>Classificação: <span id="classificacaoReceita"></span></p>
        </div>

        <div id="btn">
          <button onclick="anterior()">Anterior</button>
          <button onclick="proximo()">Próximo</button>
        </div>
      </div>
    </main>
  </body>
</html>
